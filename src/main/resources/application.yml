spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 50
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  access-exp: ${JWT_ACCESS_EXP:5000000}
  refresh-exp: ${JWT_REFRESH_EXP:1000000000}